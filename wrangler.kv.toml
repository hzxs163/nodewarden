# 修复Worker名称不匹配，统一为warden
name = "warden"

main = "src/index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = false

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = false

[build]
command = "npm run build"

[triggers]
crons = [ "*/5 * * * *" ]

[[d1_databases]]
binding = "DB"
database_name = "nodewarden-db"

[[durable_objects.bindings]]
name = "NOTIFICATIONS_HUB"
class_name = "NotificationsHub"

# 👇 重点：用你截图里的真实ID绑定已存在的KV命名空间，彻底解决10014报错
[[kv_namespaces]]
binding = "ATTACHMENTS_KV"
id = "2b6ab5bdedb545ac83af9e3c07e9fb43"

[[migrations]]
tag = "v1-notifications-hub"
new_sqlite_classes = [ "NotificationsHub" ]
